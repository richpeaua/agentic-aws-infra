name: deploy

on:
  push:
    branches: [main]
    paths:
      - "stacks/**"
      - "modules/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Serialize deploys; never cancel an in-progress apply.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # Determine which dev and prod roots have REAL changes to deploy.
  # Candidates come from the push diff (or all roots on manual dispatch); each is
  # then planned with -detailed-exitcode, and only roots with an actual diff are
  # deployed. This keeps comment-only or no-op changes from triggering an apply.
  discover:
    runs-on: ubuntu-latest
    outputs:
      dev: ${{ steps.split.outputs.dev }}
      prod: ${{ steps.split.outputs.prod }}
      any_dev: ${{ steps.split.outputs.any_dev }}
      any_prod: ${{ steps.split.outputs.any_prod }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.READ_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          terraform_wrapper: false
      - id: split
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            candidates="$(scripts/stack-roots.sh)"
          else
            candidates="$(scripts/stack-roots.sh "${{ github.event.before }}")"
          fi
          echo "candidate roots: $candidates"
          changed='[]'
          for root in $(echo "$candidates" | jq -r '.[]'); do
            terraform -chdir="$root" init -input=false -backend-config="bucket=${{ vars.STATE_BUCKET }}" >/dev/null
            set +e
            terraform -chdir="$root" plan -input=false -lock=false -detailed-exitcode >/dev/null 2>&1
            code=$?
            set -e
            case "$code" in
              0) echo "no changes: $root" ;;
              2) echo "changes: $root"; changed="$(echo "$changed" | jq -c --arg r "$root" '. + [$r]')" ;;
              *) echo "plan failed for $root (exit $code)"; exit 1 ;;
            esac
          done
          dev="$(echo "$changed" | jq -c '[.[] | select(endswith("/dev"))]')"
          prod="$(echo "$changed" | jq -c '[.[] | select(endswith("/prod"))]')"
          echo "deploying dev=$dev prod=$prod"
          echo "dev=$dev" >> "$GITHUB_OUTPUT"
          echo "prod=$prod" >> "$GITHUB_OUTPUT"
          [ "$dev" = "[]" ] && echo "any_dev=false" >> "$GITHUB_OUTPUT" || echo "any_dev=true" >> "$GITHUB_OUTPUT"
          [ "$prod" = "[]" ] && echo "any_prod=false" >> "$GITHUB_OUTPUT" || echo "any_prod=true" >> "$GITHUB_OUTPUT"

  # Apply dev (light gate) then smoke test.
  apply-dev:
    needs: discover
    if: needs.discover.outputs.any_dev == 'true'
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        root: ${{ fromJson(needs.discover.outputs.dev) }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          terraform_wrapper: false
      - name: apply
        run: |
          terraform -chdir=${{ matrix.root }} init -input=false -backend-config="bucket=${{ vars.STATE_BUCKET }}"
          terraform -chdir=${{ matrix.root }} apply -input=false -auto-approve
      - name: smoke test
        run: scripts/smoke.sh ${{ matrix.root }}

  # Apply prod, then smoke test.
  # The gate between dev and prod is automated, not a human click: `needs: apply-dev`
  # means a failed dev apply OR a failed dev smoke test (both are steps in apply-dev)
  # skips this job, so prod never applies on a broken dev. GitHub implicitly requires
  # the needs to have succeeded (the `if` has no status function), which is the guard.
  # A prod-only change (no dev diff) still runs: apply-dev is then skipped, not failed.
  # The `production` environment is retained to scope PROD_APPLY_ROLE_ARN and the
  # main-only branch policy; its human required-reviewer has been removed so merge is
  # the single deploy approval.
  apply-prod:
    needs: [discover, apply-dev]
    if: needs.discover.outputs.any_prod == 'true'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        root: ${{ fromJson(needs.discover.outputs.prod) }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          terraform_wrapper: false
      - name: apply
        run: |
          terraform -chdir=${{ matrix.root }} init -input=false -backend-config="bucket=${{ vars.STATE_BUCKET }}"
          terraform -chdir=${{ matrix.root }} apply -input=false -auto-approve
      - name: smoke test
        run: scripts/smoke.sh ${{ matrix.root }}
